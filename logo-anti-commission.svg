<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- fond -->
  <circle cx="100" cy="100" r="92" fill="#fff"/>
  <!-- fantôme de la commission -->
  <g>
    <path d="M60 142 Q54 70 100 63 Q146 70 140 142 Q133 135 125 141 Q117 148 109 141 Q101 134 93 141 Q85 148 77 141 Q69 135 60 142 Z" fill="#F4F6F5" stroke="#1B2622" stroke-width="5" stroke-linejoin="round"/>
    <!-- yeux surpris -->
    <circle cx="85" cy="96" r="6.5" fill="#1B2622"/>
    <circle cx="115" cy="96" r="6.5" fill="#1B2622"/>
    <!-- bouche "oh non" -->
    <ellipse cx="100" cy="114" rx="7" ry="9" fill="#1B2622"/>
    <!-- l'étiquette de la commission sur le ventre -->
    <text x="100" y="140" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="21" font-weight="900" fill="#C97B12">15 %</text>
  </g>
  <!-- cercle et barre d'interdiction -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="#D62828" stroke-width="16"/>
  <rect x="8" y="91" width="184" height="18" rx="9" fill="#D62828" transform="rotate(45 100 100)"/>
</svg>
