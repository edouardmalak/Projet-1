<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-Direct — Carte des contrats</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect width="16" height="16" rx="3.5" fill="%230B6E4F"/><g fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3.2v8.4M5.4 12.4h5.2M3.6 4.8h8.8"/><path d="M3.6 4.8 2.3 7.6a1.45 1.45 0 0 0 2.7 0Z"/><path d="M12.4 4.8l-1.35 2.8a1.45 1.45 0 0 0 2.7 0Z"/></g></svg>'>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--fond:#FAFBF9;--panneau:#FFFFFF;--panneau2:#F1F6F2;--ligne:#D5E3DB;--ligne2:#C3D6CB;--vert:#0B6E4F;--vert-vif:#0E8A62;--texte:#1B2622;--sourd:#5A6B63;--jaune:#C97B12;--rouge:#C0392B}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--fond);color:var(--texte);font-family:'Instrument Sans',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
.topbar{border-bottom:1px solid var(--ligne);background:rgba(255,255,255,.88);backdrop-filter:blur(4px)}
.topbar .in{max-width:1100px;margin:0 auto;padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--texte);font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px;letter-spacing:.12em}
.croix{width:28px;height:28px;display:grid;place-items:center;background:var(--vert);border-radius:5px;flex:none}
.topbar a.nav{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--sourd);text-decoration:none;letter-spacing:.06em;text-transform:uppercase}
.topbar a.nav:hover,.topbar a.nav.on{color:var(--vert-vif)}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 50px}
h1{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:18px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.sous{color:var(--sourd);font-family:'IBM Plex Mono',monospace;font-size:12.5px;margin-bottom:16px}
.filtres{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.seg{display:inline-flex;border:1px solid var(--ligne2);border-radius:8px;overflow:hidden}
.seg button{background:transparent;border:none;border-right:1px solid var(--ligne2);color:var(--sourd);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:8px 13px;cursor:pointer}
.seg button:last-child{border-right:none}
.seg button:hover{color:var(--texte)}
.seg button.on{background:rgba(18,169,110,.16);color:var(--vert-vif)}
.filtres input,.filtres select{background:var(--panneau2);border:1px solid var(--ligne2);border-radius:7px;color:var(--texte);font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:7px 10px}
.filtres input:focus,.filtres select:focus{outline:none;border-color:var(--vert)}
.filtres .compte{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--sourd)}
.filtres .compte b{color:var(--vert-vif)}
#carte{height:62vh;min-height:400px;border:1px solid var(--ligne);border-radius:10px;overflow:hidden;background:var(--panneau)}
.leaflet-container{background:#F4F8F5;font-family:'Instrument Sans',sans-serif}
.leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--panneau);color:var(--texte);border:1px solid var(--ligne2)}
.leaflet-popup-content{margin:12px 14px;font-size:13px}
.pop-ville{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--sourd);margin-bottom:8px}
.pop-c{border-top:1px solid var(--ligne);padding:8px 0 6px}
.pop-c:first-of-type{border-top:none}
.pop-c .r{font-family:'IBM Plex Mono',monospace;color:var(--vert-vif);font-weight:700}
.pop-c .d{color:var(--sourd);font-size:12px;font-family:'IBM Plex Mono',monospace;margin:2px 0 5px}
.pop-c a{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#FFFFFF;background:var(--vert);text-decoration:none;padding:4px 10px;border-radius:5px}
.pop-c a:hover{background:var(--vert-vif)}
.marqueur{width:20px;height:20px;border-radius:50% 50% 50% 0;background:var(--vert);border:2px solid #FFFFFF;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.5)}
.marqueur .nb{transform:rotate(45deg);display:block;text-align:center;color:#FFFFFF;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;line-height:16px}
.marqueur.moi{background:var(--jaune);border-color:#1a1405}
.chargement{padding:40px;text-align:center;color:var(--sourd);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.hors{margin-top:16px}
.hors h2{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sourd);margin-bottom:8px}
.hors a{display:inline-flex;gap:8px;text-decoration:none;color:var(--texte);border:1px solid var(--ligne);border-radius:7px;padding:8px 12px;margin:0 8px 8px 0;font-family:'IBM Plex Mono',monospace;font-size:12px}
.hors a:hover{border-color:var(--vert)}
.hors a b{color:var(--vert-vif)}
.legende{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--sourd)}
.legende span{display:inline-flex;align-items:center;gap:7px}
.pnt{width:12px;height:12px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:inline-block;border:2px solid #FFFFFF}
.pnt.vert{background:var(--vert)} .pnt.jaune{background:var(--jaune);border-color:#1a1405}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/design.css">
</head>
<body>
<div class="topbar">
  <div class="in">
    <a class="brand" href="/index.html"><span class="croix"><svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="#fff" stroke-width="1.35" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2.6v9.6M4.9 13.4h6.2M3 4.4h10"/><path d="M3 4.4 1.5 7.7a1.7 1.7 0 0 0 3.1 0Z"/><path d="M13 4.4l-1.55 3.3a1.7 1.7 0 0 0 3.1 0Z"/></svg></span>C-DIRECT</a>
    <div class="droite">
      <a class="nav" href="/contrats.html">Contrats</a>
      <a class="nav on" href="/carte.html">Carte</a>
      <a class="nav" href="/disponibilites.html">Disponibilités</a>
      <a class="nav" href="/mes-mandats.html">Mes mandats</a>
      <a class="nav" href="/profil.html">Profil</a>
    </div>
  </div>
</div>
<div class="wrap">
  <h1>Carte des contrats</h1>
  <p class="sous">Contrats ouverts près de vous. Positions approximatives (secteur du code postal).</p>

  <div class="filtres">
    <div class="seg" id="seg">
      <button data-m="tous" class="on">Tous</button>
      <button data-m="jour">Par jour</button>
      <button data-m="mois">Par mois</button>
      <button data-m="jsem">Jour de semaine</button>
    </div>
    <input type="date" id="f-jour" style="display:none">
    <input type="month" id="f-mois" style="display:none">
    <select id="f-jsem" style="display:none">
      <option value="1">Lundi</option>
      <option value="2">Mardi</option>
      <option value="3">Mercredi</option>
      <option value="4">Jeudi</option>
      <option value="5">Vendredi</option>
      <option value="6">Samedi</option>
      <option value="0">Dimanche</option>
    </select>
    <span class="compte" id="compte">—</span>
  </div>

  <div id="carte"><div class="chargement">Chargement de la carte…</div></div>
  <div class="legende">
    <span><i class="pnt vert"></i> Contrat disponible</span>
    <span><i class="pnt jaune"></i> Votre secteur</span>
  </div>
  <div class="hors" id="hors" style="display:none">
    <h2>Sans localisation précise</h2>
    <div id="hors-liste"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/supabase-config.js?v=20260723b"></script>
<script src="/auth.js?v=20260723b"></script>
<script src="/fsa-qc.js"></script>
<script>
const sb = window.sbClient;
const $ = id => document.getElementById(id);
let profil = null, contrats = [], map = null, couche = null, maCP = null, maPos = null;
let filtre = { mode:'tous', jour:null, mois:null, jsem:null };
function esc(s){ return String(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function jourSemaine(d){ return new Date(String(d).slice(0,10)+'T12:00:00').getDay(); } // 0=dim..6=sam

function passeFiltre(k){
  const d = String(k.date_contrat).slice(0,10);
  if(filtre.mode==='jour')  return filtre.jour ? d === filtre.jour : true;
  if(filtre.mode==='mois')  return filtre.mois ? d.slice(0,7) === filtre.mois : true;
  if(filtre.mode==='jsem')  return filtre.jsem!=null ? jourSemaine(d) === filtre.jsem : true;
  return true; // tous
}

(async function(){
  profil = await cdExigerConnexion(['pharmacien']);
  cdEnteteConnecte();
  try{ const { data } = await sb.rpc('get_contrats_ouverts'); contrats = data || []; }catch(e){}

  map = L.map('carte', { zoomControl:true, scrollWheelZoom:true }).setView([47.0, -71.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution:'© OpenStreetMap · © CARTO', maxZoom:19, subdomains:'abcd'
  }).addTo(map);
  couche = L.layerGroup().addTo(map);

  maCP = profil.code_postal || null;
  maPos = (maCP && window.CD_FSA_QC) ? CD_FSA_QC[cdFsa(maCP)] : null;
  if(maPos){
    const icoMoi = L.divIcon({ className:'', iconSize:[20,20], iconAnchor:[10,20], html:'<div class="marqueur moi"></div>' });
    L.marker(maPos, { icon:icoMoi }).addTo(map).bindPopup('<b>Votre secteur</b><br>'+esc(maCP));
  }

  /* contrôles de filtre */
  document.querySelectorAll('#seg button').forEach(b=>{
    b.onclick = ()=>{
      document.querySelectorAll('#seg button').forEach(x=>x.classList.toggle('on', x===b));
      filtre.mode = b.dataset.m;
      $('f-jour').style.display = filtre.mode==='jour' ? '' : 'none';
      $('f-mois').style.display = filtre.mode==='mois' ? '' : 'none';
      $('f-jsem').style.display = filtre.mode==='jsem' ? '' : 'none';
      if(filtre.mode==='jsem' && filtre.jsem==null) filtre.jsem = parseInt($('f-jsem').value);
      dessiner();
    };
  });
  $('f-jour').onchange = ()=>{ filtre.jour = $('f-jour').value || null; dessiner(); };
  $('f-mois').onchange = ()=>{ filtre.mois = $('f-mois').value || null; dessiner(); };
  $('f-jsem').onchange = ()=>{ filtre.jsem = parseInt($('f-jsem').value); dessiner(); };

  dessiner();
  setTimeout(()=>map.invalidateSize(), 200);
})();

function dessiner(){
  couche.clearLayers();
  const visibles = contrats.filter(passeFiltre);

  const groupes = {}, hors = [];
  visibles.forEach(k=>{
    const pos = (k.code_postal && window.CD_FSA_QC) ? CD_FSA_QC[cdFsa(k.code_postal)] : null;
    if(!pos){ hors.push(k); return; }
    const cle = pos[0]+','+pos[1];
    (groupes[cle] = groupes[cle] || { pos, liste:[] }).liste.push(k);
  });

  const bornes = [];
  Object.values(groupes).forEach(g=>{
    const nb = g.liste.length;
    const icone = L.divIcon({ className:'', iconSize:[20,20], iconAnchor:[10,20], popupAnchor:[0,-18],
      html:'<div class="marqueur"><span class="nb">'+(nb>1?nb:'')+'</span></div>' });
    const contenu = '<div class="pop-ville">'+esc(g.liste[0].ville||'Secteur')+'</div>' +
      g.liste.slice(0,8).map(k=>{
        const dist = (maCP && k.code_postal && typeof cdDistanceKm==='function') ? cdDistanceKm(maCP, k.code_postal) : null;
        return '<div class="pop-c"><span class="r">'+esc(k.numero_reference)+'</span>'+
          '<div class="d">'+cdDate(k.date_contrat)+' · '+cdArgent(k.tarif_horaire)+'/h'+
          (dist!=null?' · ~'+dist+' km':'')+(k.logiciel?' · '+esc(k.logiciel):'')+'</div>'+
          '<a href="/c/'+encodeURIComponent(k.numero_reference)+'">Voir le contrat →</a></div>';
      }).join('') +
      (nb>8?'<div class="pop-c" style="color:var(--sourd);font-family:\'IBM Plex Mono\',monospace;font-size:11px">+ '+(nb-8)+' autre(s)…</div>':'');
    L.marker(g.pos, { icon:icone }).addTo(couche).bindPopup(contenu, { maxWidth:260 });
    bornes.push(g.pos);
  });
  if(maPos) bornes.push(maPos);
  if(bornes.length){ map.fitBounds(bornes, { padding:[40,40], maxZoom:11 }); }

  const nbGeo = visibles.length - hors.length;
  $('compte').innerHTML = '<b>'+visibles.length+'</b> contrat'+(visibles.length>1?'s':'')+(visibles.length? ' · '+nbGeo+' sur la carte':'');

  if(hors.length){
    $('hors').style.display = '';
    $('hors-liste').innerHTML = hors.map(k=>
      '<a href="/c/'+encodeURIComponent(k.numero_reference)+'"><b>'+esc(k.numero_reference)+'</b> · '+
      esc(k.ville||'—')+' · '+cdArgent(k.tarif_horaire)+'/h</a>').join('');
  } else { $('hors').style.display = 'none'; }
}
</script>
</body>
</html>
